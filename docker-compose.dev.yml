services:
  postgres:
    image: postgres:16
    container_name: ecom-postgres-dev
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ecom
      POSTGRES_PASSWORD: ecom_pass
      POSTGRES_DB: ecommerce
    volumes:
      - ecom_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecom -d ecommerce"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  ecom_postgres_data:
